<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tieline Monitor{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 0.03em; }
    .status-card { border-left: 5px solid; }
    .status-card.border-success { border-left-color: #198754 !important; }
    .status-card.border-warning { border-left-color: #ffc107 !important; }
    .status-card.border-danger  { border-left-color: #dc3545 !important; }
    .status-card.border-secondary { border-left-color: #6c757d !important; }
    .big-status { font-size: 1.6rem; font-weight: 600; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-broadcast"></i> Tieline Monitor</span>
    <div>
      <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-light me-1">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a href="{{ url_for('settings_page') }}" class="btn btn-sm btn-outline-light me-1">
        <i class="bi bi-gear"></i> Settings
      </a>
      <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-box-arrow-right"></i> Logout
      </a>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
